<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign in — Toolkit</title>
  <link rel="icon" href="/img/toolkit.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/css/toolkit.css">
</head>
<body>
  <div class="scuffs" aria-hidden="true"></div>
  <canvas id="trail" aria-hidden="true" hidden></canvas>

  <div class="page">
    <nav class="nav">
      <a class="brand" href="/">
        <svg class="logo" viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <rect x="2" y="2" width="36" height="36" rx="6" fill="#ececec"/>
          <path d="M11 13h18M20 13v15" stroke="#0e0e0e" stroke-width="4" stroke-linecap="round"/>
          <path d="M8 31l4-3M32 9l-3 2.5" stroke="#0e0e0e" stroke-width="1.4" stroke-linecap="round" opacity="0.45"/>
        </svg>
        TOOLKIT
      </a>
      <div class="nav-links">
        <a href="/">Home</a>
      </div>
    </nav>

    <main class="auth-wrap">
      <div class="auth-card">
        <span class="tape" aria-hidden="true"></span>
        <h1 id="auth-title">Sign in</h1>
        <p class="sub" id="auth-sub">One key opens every tool in the box.</p>

        <div class="form-error" id="auth-error" role="alert"></div>

        <form id="auth-form" novalidate>
          <div class="field" id="name-field" hidden>
            <label for="name">Name</label>
            <input id="name" name="name" type="text" autocomplete="name" maxlength="60" placeholder="Ada Lovelace">
          </div>
          <div class="field">
            <label for="email">Email</label>
            <input id="email" name="email" type="email" autocomplete="email" maxlength="254" placeholder="you@example.com" required>
          </div>
          <div class="field">
            <label for="password">Password</label>
            <input id="password" name="password" type="password" autocomplete="current-password" maxlength="128" required>
            <p class="hint" id="pw-hint" hidden>At least 8 characters.</p>
          </div>
          <button class="btn" id="submit-btn" type="submit" style="width:100%">Sign in</button>
        </form>

        <p class="auth-toggle" id="auth-toggle">
          New around the bench? <button type="button" id="toggle-btn">Create an account</button>
        </p>
      </div>
    </main>
  </div>

  <script type="module" src="/js/auth.js"></script>
</body>
</html>
